"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
$character
"""

add_newline = true


[kubernetes]
format = 'on [⛵ ($user on )($cluster in )$context \($namespace\)](dimmed green) '
disabled = false
contexts = [
    { context_pattern = "dev.local.cluster.k8s", style = "green", symbol = "💔 " },
]
# detect_files = ['k8s']
